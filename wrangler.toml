name = "personal-website"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# ============================================================
# KV 命名空间绑定
# 
# 在 Cloudflare Dashboard 网页上配置：
# Workers & Pages → 你的 Worker → Settings → Variables and Secrets → KV Namespace Bindings
# 
# 也可以在这里填写已创建的 KV 命名空间 ID（二选一）
# ============================================================

[[kv_namespaces]]
binding = "ARTICLES_KV"
id = "f825309fe47b41ba8276d803fec66776"

[[kv_namespaces]]
binding = "COMMENTS_KV"
id = "c212ab61e4c24a2aa045a3cc99dbd60d"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "6dcb9a81d080448dbe0831f2a14fc477"

# ============================================================
# 环境变量（非敏感信息）
# 敏感信息在 Dashboard 的 Settings → Variables and Secrets 中添加
# ============================================================

[vars]
ADMIN_USERNAME = "admin"
SITE_NAME = "我的博客"
